<!-- Tell the browser this is an HTML5 document -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Calculator</title>
  <!-- Connect the CSS file -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="calculator">

    <!-- The screen that shows numbers -->
    <!-- id="display" lets JavaScript find and update this element -->
    <div class="display" id="display">0</div>

    <div class="buttons">
      <!-- data-action tells JS what to do when clicked -->
      <!-- data-value tells JS which character to use -->
      <button class="btn btn-clear"    data-action="clear">C</button>
      <button class="btn btn-operator" data-action="sign">+/-</button>
      <button class="btn btn-operator" data-action="percent">%</button>
      <button class="btn btn-operator" data-value="/">÷</button>

      <button class="btn" data-value="7">7</button>
      <button class="btn" data-value="8">8</button>
      <button class="btn" data-value="9">9</button>
      <button class="btn btn-operator" data-value="*">×</button>

      <button class="btn" data-value="4">4</button>
      <button class="btn" data-value="5">5</button>
      <button class="btn" data-value="6">6</button>
      <button class="btn btn-operator" data-value="-">−</button>

      <button class="btn" data-value="1">1</button>
      <button class="btn" data-value="2">2</button>
      <button class="btn" data-value="3">3</button>
      <button class="btn btn-operator" data-value="+">+</button>

      <!-- The 0 button spans 2 columns via CSS -->
      <button class="btn btn-zero"   data-value="0">0</button>
      <button class="btn"          data-value=".">.</button>
      <button class="btn btn-equals" data-action="calculate">=</button>
    </div>

  </div>

  <!-- Connect JS at the BOTTOM of body, not the top.       -->
  <!-- Why? The browser reads HTML top-to-bottom. If JS     -->
  <!-- loaded first, it would look for buttons that don't   -->
  <!-- exist yet and crash.                                 -->
  <script src="script.js"></script>
</body>
</html>
